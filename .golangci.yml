run:
  deadline: 10m10s
  modules-download-mode: vendor
  go: 1.17 # 1.18 disabled some linters as they don't support generics yet, as such lock to 1.17 until they do

issues:
  max-per-linter: 0
  max-same-issues: 0

linters:
  disable-all: true
  enable:
    # Core linters that work well with older golangci-lint
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - gofmt
    - goimports
    
    # Style linters
    - misspell
    - unconvert
    - wastedassign
    
    # Additional safe linters
    - asciicheck
    - durationcheck
    - errname
    - nakedret
    - nilerr
    - predeclared
    - revive
    
    # Disabled due to incompatibility with older golangci-lint and newer dependencies:
    # - gocritic, asasalint, bidichk, containedctx, contextcheck, decorder
    # - errchkjson, errorlint, exhaustive, exportloopref, gofumpt, gosec
    # - nilnil, nlreturn, nolintlint, noctx, makezero, prealloc, stylecheck
    # - unparam, vet, vetshadow, whitespace

linters-settings:
  errcheck:
    ignore: io:Close
  misspell:
    locale: uk
  nlreturn:
    block-size: 4
  wsl:
    allow-assign-and-anything: true
    allow-separated-leading-comment: true
    allow-trailing-comment: true
    allow-cuddle-declarations: true
    allow-multiline-assign: true
    force-case-trailing-whitespace: 1
    enforce-err-cuddling: true

